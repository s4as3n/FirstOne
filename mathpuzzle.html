<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Puzzle - Himalayan Adventure</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .ai-option {
            margin-bottom: 20px;
            color: #333;
        }
        .ai-option label {
            display: block;
            margin-bottom: 5px;
        }
        .ai-option input[type="radio"] {
            margin-right: 5px;
        }
        .api-key {
            margin-bottom: 20px;
        }
        .api-key label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        .api-key input {
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .difficulty {
            margin-bottom: 20px;
        }
        .difficulty button {
            margin: 0 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .difficulty button:hover {
            background: #764ba2;
        }
        .question {
            font-size: 24px;
            margin: 20px 0;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 18px;
            width: 100px;
            text-align: center;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
        }
        .final-score {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .back-link {
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Math Puzzle</h1>
        <div class="ai-option">
            <label>Use AI-generated questions?</label>
            <input type="radio" id="ai-yes" name="ai-option" value="yes" checked>
            <label for="ai-yes">Yes</label>
            <input type="radio" id="ai-no" name="ai-option" value="no">
            <label for="ai-no">No</label>
        </div>
        <div class="api-key" id="api-key-section" style="display: block;">
            <label for="api-key">Google Gemini API Key:</label>
            <input type="password" id="api-key" placeholder="Enter your Google Gemini API Key">
        </div>
        <div class="difficulty">
            <button id="easy">Easy</button>
            <button id="medium">Medium</button>
            <button id="hard">Hard</button>
        </div>
        <div id="game-area" style="display: none;">
            <div class="question" id="question"></div>
            <div id="generation-info" style="font-size: 12px; color: #666; margin-bottom: 10px;"></div>
            <input type="number" id="answer" placeholder="Your answer">
            <br>
            <button id="submit">Submit</button>
            <div class="result" id="result"></div>
            <div id="progress">Question 1 of 10</div>
        </div>
        <div id="final-result" style="display: none;">
            <div class="final-score" id="final-score"></div>
            <button id="play-again">Play Again</button>
        </div>
        <div class="back-link">
            <a href="index.html">Back to Home</a>
        </div>
    </div>

    <script>
        let difficulty = '';
        let currentQuestion = 0;
        let correctAnswers = 0;
        let questions = [];

        async function generateQuestion(level, apiKey) {
            const prompt = `Generate a complex math problem for ${level} difficulty with multiple numbers and operations. Provide only a JSON object with 'expression' and 'answer' fields. For easy: 2-3 numbers with addition and subtraction (numbers up to 50). For medium: 3-4 numbers with addition, subtraction, and multiplication (numbers up to 20). For hard: 3-4 numbers with mixed operations including division (numbers up to 100). Examples: easy: {"expression": "12 + 25 - 8", "answer": 29}, medium: {"expression": "5 * 3 + 10", "answer": 25}, hard: {"expression": "20 / 4 * 3 + 5", "answer": 20}`;

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=' + apiKey, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API request failed with status ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const content = data.candidates[0].content.parts[0].text;
                const parsed = JSON.parse(content);
                return { question: parsed.expression, answer: parsed.answer, isAI: true, error: null };
            } catch (error) {
                console.error('Error generating question:', error);
                // Fallback to simple generation
                const fallback = fallbackGenerateQuestion(level);
                return { ...fallback, isAI: false, error: error.message };
            }
        }

        function fallbackGenerateQuestion(level) {
            let num1, num2, operator, answer;
            switch (level) {
                case 'easy':
                    num1 = Math.floor(Math.random() * 50) + 1;
                    num2 = Math.floor(Math.random() * 50) + 1;
                    operator = Math.random() < 0.5 ? '+' : '-';
                    if (operator === '-' && num1 < num2) [num1, num2] = [num2, num1];
                    answer = operator === '+' ? num1 + num2 : num1 - num2;
                    break;
                case 'medium':
                    num1 = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * 20) + 1;
                    operator = '*';
                    answer = num1 * num2;
                    break;
                case 'hard':
                    answer = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                    num1 = answer * num2;
                    operator = '/';
                    break;
            }
            return { question: `${num1} ${operator} ${num2}`, answer: answer, isAI: false, error: null };
        }

        async function startGame(level) {
            const useAI = document.querySelector('input[name="ai-option"]:checked').value === 'yes';
            const apiKey = document.getElementById('api-key').value;
            if (useAI && !apiKey) {
                alert('Please enter your Google Gemini API Key');
                return;
            }
            difficulty = level;
            currentQuestion = 0;
            correctAnswers = 0;
            questions = [];
            document.getElementById('result').textContent = useAI ? 'Generating questions...' : 'Preparing questions...';
            document.querySelector('.difficulty').style.display = 'none';
            document.getElementById('api-key').disabled = true;
            for (let i = 0; i < 10; i++) {
                if (useAI) {
                    questions.push(await generateQuestion(level, apiKey));
                } else {
                    questions.push(fallbackGenerateQuestion(level));
                }
            }
            document.getElementById('result').textContent = '';
            document.getElementById('game-area').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('question').textContent = `What is ${questions[currentQuestion].question}?`;
            const currentQ = questions[currentQuestion];
            let info = currentQ.isAI ? 'Generated by AI' : 'Generated locally (fallback)';
            if (currentQ.error) {
                info += ` (API Error: ${currentQ.error})`;
            }
            document.getElementById('generation-info').textContent = info;
            document.getElementById('answer').value = '';
            document.getElementById('result').textContent = '';
            document.getElementById('progress').textContent = `Question ${currentQuestion + 1} of 10`;
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const correctAnswer = questions[currentQuestion].answer;
            if (userAnswer === correctAnswer) {
                correctAnswers++;
                document.getElementById('result').textContent = 'Correct!';
                document.getElementById('result').style.color = 'green';
            } else {
                document.getElementById('result').textContent = `Wrong! The correct answer is ${correctAnswer}`;
                document.getElementById('result').style.color = 'red';
            }
            currentQuestion++;
            if (currentQuestion < 10) {
                setTimeout(showQuestion, 2000);
            } else {
                setTimeout(showFinalResult, 2000);
            }
        }

        function showFinalResult() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('final-result').style.display = 'block';
            document.getElementById('final-score').textContent = `You got ${correctAnswers} out of 10 correct!`;
        }

        function resetGame() {
            document.getElementById('final-result').style.display = 'none';
            document.querySelector('.difficulty').style.display = 'block';
            document.getElementById('api-key').disabled = false;
        }

        // Handle AI option change
        document.querySelectorAll('input[name="ai-option"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const apiKeySection = document.getElementById('api-key-section');
                if (this.value === 'yes') {
                    apiKeySection.style.display = 'block';
                } else {
                    apiKeySection.style.display = 'none';
                }
            });
        });

        document.getElementById('easy').addEventListener('click', () => startGame('easy'));
        document.getElementById('medium').addEventListener('click', () => startGame('medium'));
        document.getElementById('hard').addEventListener('click', () => startGame('hard'));
        document.getElementById('submit').addEventListener('click', checkAnswer);
        document.getElementById('play-again').addEventListener('click', resetGame);
    </script>
</body>
</html>
