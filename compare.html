<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Compare - Gemini</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #222;
        }
        .container {
            width: min(700px, calc(100% - 40px));
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 32px;
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        label {
            display: block;
            margin: 18px 0 8px;
            font-weight: 600;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d4d4d8;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #5b6dde;
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            color: #555;
            min-height: 20px;
        }
        .output {
            margin-top: 24px;
            padding: 20px;
            background: #f7f8ff;
            border: 1px solid #e2e6f0;
            border-radius: 12px;
            color: #1b1f3b;
        }
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 18px;
        }
        .comparison-table th,
        .comparison-table td {
            padding: 12px 10px;
            border: 1px solid #e2e6f0;
            text-align: left;
            vertical-align: top;
        }
        .comparison-table th {
            background: #eef0fc;
            font-weight: 700;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Compare Two Mobile Phones</h1>
        <p>Enter two Amazon.in product URLs and your Google Gemini API key. The page will ask Gemini to compare processor, camera, RAM, storage, display size, and price.</p>

        <label for="phone-url-1">Phone 1 URL</label>
        <input type="text" id="phone-url-1" placeholder="https://www.amazon.in/..." />

        <label for="phone-url-2">Phone 2 URL</label>
        <input type="text" id="phone-url-2" placeholder="https://www.amazon.in/..." />

        <label for="api-key">Google Gemini API Key</label>
        <input type="password" id="api-key" placeholder="Enter your Gemini API key" />

        <button id="compare-button">Compare Phones</button>
        <div class="status" id="status"></div>

        <div class="output" id="output" style="display: none;">
            <table class="comparison-table" id="comparison-table"></table>
            <div id="summary"></div>
        </div>

        <div class="footer">
            <a href="index.html">Back to Home</a>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const tableEl = document.getElementById('comparison-table');
        const summaryEl = document.getElementById('summary');
        const compareButton = document.getElementById('compare-button');

        compareButton.addEventListener('click', async () => {
            const url1 = document.getElementById('phone-url-1').value.trim();
            const url2 = document.getElementById('phone-url-2').value.trim();
            const apiKey = document.getElementById('api-key').value.trim();

            outputEl.style.display = 'none';
            tableEl.innerHTML = '';
            summaryEl.textContent = '';
            statusEl.textContent = '';

            if (!url1 || !url2) {
                statusEl.textContent = 'Please enter both Amazon.in phone URLs.';
                return;
            }
            if (!apiKey) {
                statusEl.textContent = 'Please enter your Gemini API key.';
                return;
            }

            statusEl.textContent = 'Generating comparison using Gemini...';
            compareButton.disabled = true;

            const prompt = `You are a phone comparison assistant. Compare the two mobile phones from the following Amazon India URLs. Focus only on processor, camera, RAM, storage, display size, and price. Return only valid JSON with the keys phone1, phone2, and summary. Each phone object should include processor, camera, ram, storage, displaySize, and price. If information cannot be verified, use 'Unknown'. Do not include extra text outside the JSON object. Use the exact URLs only for reference:\nPhone 1: ${url1}\nPhone 2: ${url2}`;

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=' + encodeURIComponent(apiKey), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: prompt }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Request failed: ${response.status} ${response.statusText} - ${errorText}`);
                }

                const data = await response.json();
                const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) {
                    throw new Error('Unexpected Gemini response format.');
                }

                let json;
                try {
                    json = JSON.parse(text.trim());
                } catch (parseError) {
                    throw new Error('Failed to parse Gemini response as JSON.');
                }

                const criteria = ['processor', 'camera', 'ram', 'storage', 'displaySize', 'price'];
                const rows = ['Processor', 'Camera', 'RAM', 'Storage', 'Display Size', 'Price'];

                let tableHtml = '<thead><tr><th>Specification</th><th>Phone 1</th><th>Phone 2</th></tr></thead><tbody>';
                for (let i = 0; i < criteria.length; i++) {
                    const key = criteria[i];
                    const label = rows[i];
                    const value1 = json.phone1?.[key] ?? 'Unknown';
                    const value2 = json.phone2?.[key] ?? 'Unknown';
                    tableHtml += `<tr><td>${label}</td><td>${value1}</td><td>${value2}</td></tr>`;
                }
                tableHtml += '</tbody>';

                tableEl.innerHTML = tableHtml;
                summaryEl.textContent = json.summary ?? 'No summary provided.';
                outputEl.style.display = 'block';
                statusEl.textContent = 'Comparison generated successfully.';
            } catch (error) {
                statusEl.textContent = `Error: ${error.message}`;
                outputEl.style.display = 'none';
                tableEl.innerHTML = '';
                summaryEl.textContent = '';
            } finally {
                compareButton.disabled = false;
            }
        });
    </script>
</body>
</html>
