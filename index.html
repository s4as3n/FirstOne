<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himalayan Adventure</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }
        .welcome-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin: 0;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-top: 10px;
        }
        #tictactoe {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
            margin-bottom: 10px;
        }
        .cell {
            width: 50px;
            height: 50px;
            background: white;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        #winCounter {
            font-size: 16px;
            margin-bottom: 10px;
        }
        #reset {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Himalayan Adventure</h1>
        <p>have a great time learning new things.. I wish you all the best</p>
    </div>
    <div id="tictactoe">
        <h3>Tic Tac Toe</h3>
        <div id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div id="winCounterX">X Wins: 0</div>
        <div id="winCounterO">O Wins: 0</div>
        <button id="reset">Reset Game</button>
    </div>
    <script>
        const board = Array(9).fill(null);
        let currentPlayer = 'X';
        let winsX = 0;
        let winsO = 0;
        const cells = document.querySelectorAll('.cell');
        const winCounterX = document.getElementById('winCounterX');
        const winCounterO = document.getElementById('winCounterO');
        const resetButton = document.getElementById('reset');

        cells.forEach(cell => cell.addEventListener('click', handleClick));
        resetButton.addEventListener('click', resetGame);

        function handleClick(e) {
            const index = parseInt(e.target.dataset.index);
            if (board[index] || checkWinner(board, currentPlayer)) return;
            board[index] = currentPlayer;
            e.target.textContent = currentPlayer;
            if (checkWinner(board, currentPlayer)) {
                if (currentPlayer === 'X') {
                    winsX++;
                    winCounterX.textContent = `X Wins: ${winsX}`;
                } else {
                    winsO++;
                    winCounterO.textContent = `O Wins: ${winsO}`;
                }
                alert(`${currentPlayer} wins!`);
            } else if (board.every(cell => cell)) {
                alert('Draw!');
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            }
        }

        function checkWinner(board, player) {
            const winPatterns = [
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];
            return winPatterns.some(pattern => {
                return pattern.every(index => board[index] === player);
            });
        }

        function resetGame() {
            board.fill(null);
            cells.forEach(cell => cell.textContent = '');
            currentPlayer = 'X';
        }
    </script>
</body>
</html>
