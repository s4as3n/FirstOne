<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game - Himalayan Adventure</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .game-content {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        .hangman-drawing {
            width: 150px;
            height: 200px;
        }
        svg {
            width: 100%;
            height: 100%;
        }
        .game-info {
            text-align: left;
        }
        #word-display {
            font-size: 32px;
            letter-spacing: 10px;
            margin: 20px 0;
            font-weight: bold;
        }
        #message {
            font-size: 18px;
            margin: 15px 0;
            color: #666;
        }
        #guesses {
            margin: 15px 0;
            font-size: 14px;
        }
        #keyboard {
            display: grid;
            grid-template-columns: repeat(7, 40px);
            gap: 5px;
            margin: 20px 0;
        }
        .letter-btn {
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .letter-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #reset-btn {
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        #reset-btn:hover {
            background: #5a3a7a;
        }
        #setup input,
        #wordInput input {
            padding: 10px;
            margin: 8px 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            width: 160px;
        }
        #setup button,
        #wordInput button,
        #nextRoundBtn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        #setup button:hover,
        #wordInput button:hover,
        #nextRoundBtn:hover {
            background: #764ba2;
        }
        .coin-toss {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
        }
        .coin {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            position: relative;
            transform-style: preserve-3d;
            animation: flipCoin 1.5s ease-in-out;
        }
        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #333;
        }
        .coin-front {
            background: radial-gradient(circle at 30% 30%, #f8e960 20%, #d4a017 55%, #f5d76e 100%);
        }
        .coin-back {
            background: radial-gradient(circle at 30% 30%, #f8e960 20%, #d4a017 55%, #f5d76e 100%);
            transform: rotateY(180deg);
        }
        @keyframes flipCoin {
            0% { transform: rotateX(0deg); }
            25% { transform: rotateX(180deg); }
            50% { transform: rotateX(360deg); }
            75% { transform: rotateX(540deg); }
            100% { transform: rotateX(720deg); }
        }
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: #fff;
            padding: 25px 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            font-size: 22px;
            text-align: center;
            z-index: 1000;
            display: none;
        }
        .match-popup {
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
        }
        .match-popup button {
            margin-top: 20px;
            padding: 10px 18px;
            background: #fff;
            color: #ff6b6b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .match-popup button:hover {
            background: #f0f0f0;
        }
        .back-link {
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hangman Game</h1>
        <div id="setup">
            <h2>Two-player Hangman</h2>
            <input type="text" id="player1Input" placeholder="Player 1 Name" value="Player 1">
            <input type="text" id="player2Input" placeholder="Player 2 Name" value="Player 2">
            <br>
            <label for="roundsInput" style="margin-right:10px; font-weight:bold;">Number of rounds</label>
            <input type="number" id="roundsInput" placeholder="Rounds" min="1" value="3" style="width:100px; margin-top:10px;">
            <div style="margin-top:15px;">
                <label>Player 1 chooses:</label>
                <select id="player1Choice">
                    <option value="heads">Heads</option>
                    <option value="tails">Tails</option>
                </select>
            </div>
            <div style="margin-top:10px;">
                <label>Player 2 chooses:</label>
                <select id="player2Choice">
                    <option value="tails">Tails</option>
                    <option value="heads">Heads</option>
                </select>
            </div>
            <button id="startMatchBtn">Start Match</button>
        </div>
        <div id="wordInput" style="display:none; margin-top: 20px;">
            <div id="setterInfo" style="font-weight:bold; margin-bottom:10px;"></div>
            <input type="password" id="setterWordInput" maxlength="5" placeholder="Enter 5-letter word">
            <button id="submitWordBtn">Submit Word</button>
        </div>
        <div id="coinToss" class="coin-toss">
            <div class="coin">
                <div class="coin-face coin-front">H</div>
                <div class="coin-face coin-back">T</div>
            </div>
        </div>
        <div id="gameArea" class="game-content" style="display:none;">
            <div class="hangman-drawing">
                <svg id="hangman-svg" viewBox="0 0 200 250">
                    <!-- Base -->
                    <line x1="10" y1="230" x2="150" y2="230" stroke="black" stroke-width="4"/>
                    <!-- Pole -->
                    <line x1="50" y1="230" x2="50" y2="20" stroke="black" stroke-width="4"/>
                    <!-- Top -->
                    <line x1="50" y1="20" x2="130" y2="20" stroke="black" stroke-width="4"/>
                    <!-- Rope -->
                    <line x1="130" y1="20" x2="130" y2="50" stroke="black" stroke-width="2"/>
                    <!-- Head -->
                    <circle id="head" cx="130" cy="70" r="20" stroke="black" stroke-width="2" fill="none" style="display:none"/>
                    <!-- Body -->
                    <line id="body" x1="130" y1="90" x2="130" y2="150" stroke="black" stroke-width="2" style="display:none"/>
                    <!-- Left Arm -->
                    <line id="left-arm" x1="130" y1="110" x2="100" y2="130" stroke="black" stroke-width="2" style="display:none"/>
                    <!-- Right Arm -->
                    <line id="right-arm" x1="130" y1="110" x2="160" y2="130" stroke="black" stroke-width="2" style="display:none"/>
                    <!-- Left Leg -->
                    <line id="left-leg" x1="130" y1="150" x2="110" y2="190" stroke="black" stroke-width="2" style="display:none"/>
                    <!-- Right Leg -->
                    <line id="right-leg" x1="130" y1="150" x2="150" y2="190" stroke="black" stroke-width="2" style="display:none"/>
                </svg>
            </div>
            <div class="game-info">
                <div id="roleDisplay"></div>
                <div id="scoreboard" style="margin-bottom:10px; font-weight:bold;"></div>
                <div id="word-display"></div>
                <div id="message"></div>
                <div id="guesses"><strong>Wrong Guesses:</strong> <span id="wrong-letters"></span></div>
                <div id="keyboard"></div>
                <button id="nextRoundBtn" style="display:none;">Next Round</button>
                <div class="back-link">
                    <a href="../index.html">← Back to Home</a>
                </div>
            </div>
        </div>
        <div id="roundPopup" class="popup"></div>
        <div id="tossPopup" class="popup"></div>
        <div id="matchPopup" class="popup match-popup">
            <div id="matchPopupText"></div>
            <button id="newMatchBtn">Start New Match</button>
        </div>
    </div>

    <script>
        const hangmanParts = ['head', 'body', 'left-arm', 'right-arm', 'left-leg', 'right-leg'];
        let player1Name = 'Player 1';
        let player2Name = 'Player 2';
        let totalRounds = 1;
        let currentRound = 1;
        let wins1 = 0;
        let wins2 = 0;
        let currentSetter = 1;
        let currentGuesser = 2;
        let word = '';
        let guessedLetters = [];
        let wrongGuesses = [];
        let gameOver = false;

        const startMatchBtn = document.getElementById('startMatchBtn');
        const submitWordBtn = document.getElementById('submitWordBtn');
        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const newMatchBtn = document.getElementById('newMatchBtn');
        const setup = document.getElementById('setup');
        const wordInput = document.getElementById('wordInput');
        const gameArea = document.getElementById('gameArea');
        const setterInfo = document.getElementById('setterInfo');
        const roleDisplay = document.getElementById('roleDisplay');
        const scoreboard = document.getElementById('scoreboard');
        const wordDisplay = document.getElementById('word-display');
        const messageDisplay = document.getElementById('message');
        const wrongLettersDisplay = document.getElementById('wrong-letters');
        const keyboard = document.getElementById('keyboard');
        const setterWordInput = document.getElementById('setterWordInput');
        const roundPopup = document.getElementById('roundPopup');
        const tossPopup = document.getElementById('tossPopup');
        const coinToss = document.getElementById('coinToss');
        const matchPopup = document.getElementById('matchPopup');
        const matchPopupText = document.getElementById('matchPopupText');

        startMatchBtn.addEventListener('click', startMatch);
        submitWordBtn.addEventListener('click', submitWord);
        nextRoundBtn.addEventListener('click', startNextRound);
        newMatchBtn.addEventListener('click', startNewMatch);

        function startMatch() {
            const p1Choice = document.getElementById('player1Choice').value;
            const p2Choice = document.getElementById('player2Choice').value;
            if (p1Choice === p2Choice) {
                messageDisplay.textContent = 'Players must choose opposite coin sides.';
                return;
            }
            player1Name = document.getElementById('player1Input').value.trim() || 'Player 1';
            player2Name = document.getElementById('player2Input').value.trim() || 'Player 2';
            totalRounds = parseInt(document.getElementById('roundsInput').value, 10) || 1;
            if (totalRounds < 1) {
                messageDisplay.textContent = 'Enter at least 1 round.';
                return;
            }
            const toss = Math.random() < 0.5 ? 'heads' : 'tails';
            const setterWins = p1Choice === toss;
            currentSetter = setterWins ? 1 : 2;
            currentGuesser = currentSetter === 1 ? 2 : 1;
            wins1 = 0;
            wins2 = 0;
            currentRound = 1;
            setup.style.display = 'none';
            roundPopup.style.display = 'none';
            matchPopup.style.display = 'none';
            setterWordInput.value = '';
            coinToss.style.display = 'flex';
            messageDisplay.textContent = 'Tossing the coin...';
            setTimeout(() => {
                coinToss.style.display = 'none';
                const tossResult = toss;
                const setterName = currentSetter === 1 ? player1Name : player2Name;
                const chooserName = currentSetter === 1 ? player2Name : player1Name;
                showTossPopup(`${player1Name} chose ${p1Choice}, ${player2Name} chose ${p2Choice}. Toss is ${tossResult}. ${setterName} sets first.`);
                setTimeout(() => {
                    tossPopup.style.display = 'none';
                    wordInput.style.display = 'block';
                    updateSetterInfo();
                    updateScoreboard();
                    messageDisplay.textContent = `${setterName} sets the first word.`;
                }, 2000);
            }, 1600);
        }

        function updateSetterInfo() {
            const setterName = currentSetter === 1 ? player1Name : player2Name;
            const guesserName = currentGuesser === 1 ? player1Name : player2Name;
            setterInfo.textContent = `Round ${currentRound} of ${totalRounds}: ${setterName} sets the word for ${guesserName}.`;
            roleDisplay.textContent = `${guesserName} is guessing now.`;
        }

        function submitWord() {
            const entered = setterWordInput.value.trim().toLowerCase();
            if (!/^[a-z]{5}$/.test(entered)) {
                messageDisplay.textContent = 'Please enter exactly 5 letters.';
                return;
            }
            word = entered;
            wordInput.style.display = 'none';
            gameArea.style.display = 'flex';
            initGame();
        }

        function initGame() {
            guessedLetters = [];
            wrongGuesses = [];
            gameOver = false;
            displayWord();
            updateKeyboard();
            updateHangman();
            updateWrongGuesses();
            updateScoreboard();
            messageDisplay.textContent = `${currentGuesser === 1 ? player1Name : player2Name} is guessing now.`;
            nextRoundBtn.style.display = 'none';
        }

        function displayWord() {
            const display = word.split('').map(letter => 
                guessedLetters.includes(letter) ? letter : '_'
            ).join(' ');
            wordDisplay.textContent = display;
        }

        function updateScoreboard() {
            scoreboard.textContent = `${player1Name}: ${wins1}   |   ${player2Name}: ${wins2}`;
        }

        function guessLetter(letter) {
            if (guessedLetters.includes(letter) || gameOver) return;
            guessedLetters.push(letter);
            if (!word.includes(letter)) {
                wrongGuesses.push(letter);
                updateHangman();
            }
            displayWord();
            updateWrongGuesses();
            checkGameStatus();
        }

        function updateWrongGuesses() {
            wrongLettersDisplay.textContent = wrongGuesses.join(', ');
        }

        function updateHangman() {
            hangmanParts.forEach((part, index) => {
                const element = document.getElementById(part);
                element.style.display = wrongGuesses.length > index ? 'block' : 'none';
            });
        }

        function checkGameStatus() {
            const isWon = word.split('').every(letter => guessedLetters.includes(letter));
            if (isWon) {
                const winnerName = currentGuesser === 1 ? player1Name : player2Name;
                const roundMessage = `${winnerName} wins this round!`;
                showRoundPopup(roundMessage);
                if (currentGuesser === 1) {
                    wins1++;
                } else {
                    wins2++;
                }
                updateScoreboard();
                gameOver = true;
                if (currentRound < totalRounds) {
                    nextRoundBtn.style.display = 'inline-block';
                } else {
                    showMatchPopup();
                }
            } else if (wrongGuesses.length >= 6) {
                const winnerName = currentSetter === 1 ? player1Name : player2Name;
                const roundMessage = `${winnerName} wins this round!`;
                showRoundPopup(roundMessage);
                messageDisplay.textContent = `😢 Game Over! The word was ${word.toUpperCase()}`;
                wordDisplay.textContent = word.split('').join(' ');
                if (currentSetter === 1) {
                    wins1++;
                } else {
                    wins2++;
                }
                updateScoreboard();
                gameOver = true;
                if (currentRound < totalRounds) {
                    nextRoundBtn.style.display = 'inline-block';
                } else {
                    showMatchPopup();
                }
            }
            updateKeyboard();
        }

        function showRoundPopup(text) {
            roundPopup.textContent = text;
            roundPopup.style.display = 'block';
            setTimeout(() => {
                roundPopup.style.display = 'none';
            }, 1500);
        }

        function showTossPopup(text) {
            tossPopup.textContent = text;
            tossPopup.style.display = 'block';
        }

        function updateKeyboard() {
            keyboard.innerHTML = '';
            for (let i = 97; i <= 122; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = 'letter-btn';
                btn.disabled = guessedLetters.includes(letter) || gameOver;
                btn.onclick = () => {
                    guessLetter(letter);
                };
                keyboard.appendChild(btn);
            }
        }

        function startNextRound() {
            currentRound++;
            currentSetter = currentSetter === 1 ? 2 : 1;
            currentGuesser = currentSetter === 1 ? 2 : 1;
            wordInput.style.display = 'block';
            gameArea.style.display = 'none';
            setterWordInput.value = '';
            nextRoundBtn.style.display = 'none';
            updateSetterInfo();
            messageDisplay.textContent = `${currentSetter === 1 ? player1Name : player2Name} should enter a new 5-letter word.`;
        }

        function showMatchPopup() {
            const winnerText = wins1 > wins2 ? `${player1Name} wins the match!` : wins2 > wins1 ? `${player2Name} wins the match!` : 'The match is a tie!';
            matchPopupText.textContent = `${winnerText}\n${player1Name}: ${wins1} | ${player2Name}: ${wins2}`;
            matchPopup.style.display = 'block';
        }

        function startNewMatch() {
            setup.style.display = 'block';
            wordInput.style.display = 'none';
            gameArea.style.display = 'none';
            matchPopup.style.display = 'none';
            setterWordInput.value = '';
            messageDisplay.textContent = '';
            wrongLettersDisplay.textContent = '';
            wordDisplay.textContent = '';
            roleDisplay.textContent = '';
            currentRound = 1;
            wins1 = 0;
            wins2 = 0;
            updateScoreboard();
        }
    </script>
</body>
</html>
